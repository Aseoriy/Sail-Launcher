<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sail Hub - Themes & Plugins</title>
    <meta name="description" content="Browse and install community-created themes and plugins for Sail Launcher.">
    
    <!-- Icons & Cover Photo -->
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta property="og:title" content="Sail Hub - Themes & Plugins">
    <meta property="og:description" content="Browse and install community-created themes and plugins for Sail Launcher.">
    <meta property="og:image" content="icon.png">
    <meta property="og:url" content="https://aseoriy.github.io/Sail-Launcher/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="icon.png">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #09090b; --text: #fafafa; --card: #18181b;
            --border: #27272a; --accent: #a855f7; --accent-hover: #c084fc;
            --muted: #a1a1aa; --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        body::before {
            content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background: radial-gradient(circle at 50% 50%, var(--accent), transparent 60%);
            animation: pulse 6s infinite alternate; opacity: 0.12;
        }
        @keyframes pulse { 0%{transform:scale(1);opacity:.08} 100%{transform:scale(1.2);opacity:.18} }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        @keyframes modalIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Navbar */
        .navbar {
            background: rgba(9,9,11,.85); backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border); padding: 14px 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: 1px; color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--accent); }
        .nav-right { display: flex; align-items: center; gap: 12px; }
        .search-bar {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            padding: 9px 18px; border-radius: 999px; width: 280px; outline: none; transition: .3s;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 12px rgba(168,85,247,.25); }

        /* Buttons */
        .btn {
            padding: 9px 18px; border-radius: 8px; border: 1px solid var(--border);
            background: transparent; color: var(--text); font-weight: 600; cursor: pointer;
            transition: .2s; font-size: .9rem; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
        .btn-accent { background: var(--accent); border-color: var(--accent); color: #fff; }
        .btn-accent:hover { background: var(--accent-hover); border-color: var(--accent-hover); color: #fff; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: .8rem; }
        .btn:disabled { opacity: .5; cursor: not-allowed; transform: none !important; }

        /* Container & Hero */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; flex-grow: 1; width: 100%; }
        .hero { text-align: center; margin-bottom: 50px; }
        .hero h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 0 0 20px rgba(168,85,247,.4); }
        .hero p { color: var(--muted); font-size: 1.1rem; max-width: 600px; margin: 0 auto; }

        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .tab {
            background: transparent; border: none; color: var(--muted); font-size: 1rem;
            font-weight: 600; cursor: pointer; padding: 8px 14px; border-radius: 8px; transition: .2s;
        }
        .tab:hover { color: var(--text); background: rgba(255,255,255,.04); }
        .tab.active { color: var(--accent); background: rgba(168,85,247,.1); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(280px,1fr)); gap: 22px; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            overflow: hidden; transition: .3s cubic-bezier(.4,0,.2,1); display: flex; flex-direction: column;
            animation: fadeIn .4s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,.5), 0 0 12px rgba(168,85,247,.15); }
        .card-img-wrap { width: 100%; height: 155px; overflow: hidden; position: relative; background: #111; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: .3s; }
        .card:hover .card-img { transform: scale(1.05); }
        .card-badge {
            position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
            padding: 3px 9px; border-radius: 6px; font-size: .72rem; font-weight: bold; border: 1px solid rgba(255,255,255,.1);
        }
        .card-badge.theme { color: #38bdf8; border-color: rgba(56,189,248,.3); }
        .card-badge.plugin { color: #f43f5e; border-color: rgba(244,63,94,.3); }
        .card-body { padding: 18px; flex-grow: 1; display: flex; flex-direction: column; }
        .card-title { font-size: 1.15rem; margin-bottom: 4px; }
        .card-meta { font-size: .82rem; color: var(--muted); margin-bottom: 12px; display: flex; justify-content: space-between; }
        .card-desc { font-size: .88rem; color: #d4d4d8; line-height: 1.5; flex-grow: 1; margin-bottom: 16px; }
        .card-actions { display: flex; gap: 8px; }
        .card-actions .btn { flex-grow: 1; justify-content: center; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8);
            justify-content: center; align-items: center; z-index: 200;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--card); border: 1px solid var(--border); border-radius: 14px;
            padding: 30px; width: 440px; max-width: 92vw; max-height: 88vh; overflow-y: auto;
            animation: modalIn .3s ease; position: relative;
        }
        .modal h2 { margin-bottom: 20px; font-size: 1.4rem; }
        .modal-close {
            position: absolute; top: 14px; right: 14px; background: none; border: none;
            color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: .2s;
        }
        .modal-close:hover { color: var(--danger); background: rgba(239,68,68,.1); }

        /* Form Fields */
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: .82rem; color: var(--muted); margin-bottom: 6px; }
        .field input, .field select, .field textarea {
            width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px; outline: none; transition: .2s; font-family: inherit;
        }
        .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
        .field textarea { resize: vertical; min-height: 70px; }
        .field-row { display: flex; gap: 10px; }
        .field-row .field { flex: 1; }
        .field .file-input-label {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            padding: 10px; border: 1px dashed var(--border); border-radius: 8px; cursor: pointer;
            color: var(--muted); transition: .2s; font-size: .9rem;
        }
        .field .file-input-label:hover { border-color: var(--accent); color: var(--accent); }
        .field input[type="file"] { display: none; }
        .error-text { color: var(--danger); font-size: .82rem; margin-top: 6px; }
        .success-text { color: #10b981; font-size: .82rem; margin-top: 6px; }

        /* User chip in navbar */
        .user-chip {
            display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.05);
            padding: 6px 14px; border-radius: 999px; font-size: .88rem; border: 1px solid var(--border);
        }
        .user-chip .avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: .7rem; color: #fff; font-weight: bold; }

        /* Empty State */
        .empty { grid-column: 1/-1; text-align: center; color: var(--muted); padding: 60px 20px; }
        .empty p { font-size: 1.1rem; }

        /* Footer */
        footer { text-align: center; padding: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: .85rem; }
        footer a { color: var(--accent); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 640px) {
            .navbar { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
            .search-bar { width: 100%; order: 3; }
            .hero h1 { font-size: 2rem; }
            .container { padding: 20px 14px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="#" class="logo">⛵ Sail <span>Hub</span></a>
    <div class="nav-right">
        <input type="text" id="searchInput" class="search-bar" placeholder="🔍 Search themes & plugins...">
        <!-- Auth buttons (shown/hidden by JS) -->
        <div id="authBtns">
            <button class="btn btn-sm" onclick="showModal('loginModal')">Log In</button>
            <button class="btn btn-accent btn-sm" onclick="showModal('signupModal')">Sign Up</button>
        </div>
        <div id="userArea" style="display:none;">
            <div class="user-chip">
                <div class="avatar" id="userAvatar">?</div>
                <span id="userName">User</span>
            </div>
            <button class="btn btn-accent btn-sm" onclick="showModal('uploadModal')">📤 Upload</button>
            <button class="btn btn-sm btn-danger" onclick="logOut()">Log Out</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="hero">
        <h1>Customize Your Experience</h1>
        <p>Discover community-created themes and powerful plugins for Sail Launcher.</p>
    </div>

    <div class="tabs" id="filterTabs">
        <button class="tab active" data-filter="all">All Items</button>
        <button class="tab" data-filter="theme">🎨 Themes</button>
        <button class="tab" data-filter="plugin">⚙️ Plugins</button>
    </div>

    <div class="grid" id="itemsGrid"></div>
</div>

<footer>
    <p>Built for <a href="https://github.com/Aseoriy/Sail-Launcher">Sail Launcher</a>. Want to submit your own? Log in and click Upload!</p>
</footer>

<!-- ========== LOGIN MODAL ========== -->
<div class="modal-overlay" id="loginModal">
    <div class="modal">
        <button class="modal-close" onclick="hideModal('loginModal')">✕</button>
        <h2>Welcome Back</h2>
        <div class="field">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <div id="loginError" class="error-text" style="display:none;"></div>
        <button class="btn btn-accent" style="width:100%;justify-content:center;margin-top:8px;" onclick="logIn()">Log In</button>
    </div>
</div>

<!-- ========== SIGNUP MODAL ========== -->
<div class="modal-overlay" id="signupModal">
    <div class="modal">
        <button class="modal-close" onclick="hideModal('signupModal')">✕</button>
        <h2>Create Account</h2>
        <div class="field">
            <label>Username</label>
            <input type="text" id="signupUsername" placeholder="CoolGamer42" maxlength="24">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="signupEmail" placeholder="you@example.com">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="signupPassword" placeholder="At least 6 characters">
        </div>
        <div id="signupError" class="error-text" style="display:none;"></div>
        <div id="signupSuccess" class="success-text" style="display:none;"></div>
        <button class="btn btn-accent" style="width:100%;justify-content:center;margin-top:8px;" onclick="signUp()">Create Account</button>
    </div>
</div>

<!-- ========== UPLOAD MODAL ========== -->
<div class="modal-overlay" id="uploadModal">
    <div class="modal">
        <button class="modal-close" onclick="hideModal('uploadModal')">✕</button>
        <h2>📤 Upload to Sail Hub</h2>
        <div class="field-row">
            <div class="field">
                <label>Name</label>
                <input type="text" id="uploadName" placeholder="My Awesome Theme">
            </div>
            <div class="field" style="flex:.6;">
                <label>Type</label>
                <select id="uploadType">
                    <option value="theme">🎨 Theme</option>
                    <option value="plugin">⚙️ Plugin</option>
                </select>
            </div>
        </div>
        <div class="field">
            <label>Description</label>
            <textarea id="uploadDesc" placeholder="Describe what your theme/plugin does..."></textarea>
        </div>
        <div class="field">
            <label>Preview Image</label>
            <label class="file-input-label" id="previewLabel">
                <span id="previewLabelText">📷 Choose an image (.png, .jpg, .webp)</span>
                <input type="file" id="uploadPreview" accept="image/*" onchange="updateFileLabel(this, 'previewLabelText')">
            </label>
        </div>
        <div class="field">
            <label>File (.json for themes, .zip or .rar for plugins)</label>
            <label class="file-input-label" id="fileLabel">
                <span id="fileLabelText">📁 Choose a file</span>
                <input type="file" id="uploadFile" accept=".json,.zip,.rar" onchange="updateFileLabel(this, 'fileLabelText')">
            </label>
        </div>
        <div id="uploadError" class="error-text" style="display:none;"></div>
        <div id="uploadSuccess" class="success-text" style="display:none;"></div>
        <button class="btn btn-accent" id="uploadBtn" style="width:100%;justify-content:center;margin-top:8px;" onclick="uploadItem()">🚀 Publish</button>
    </div>
</div>

<!-- ========== EDIT MODAL ========== -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <button class="modal-close" onclick="hideModal('editModal')">✕</button>
        <h2>✏️ Edit Item</h2>
        <input type="hidden" id="editItemId">
        <div class="field-row">
            <div class="field">
                <label>Name</label>
                <input type="text" id="editName">
            </div>
        </div>
        <div class="field">
            <label>Description</label>
            <textarea id="editDesc"></textarea>
        </div>
        <div class="field">
            <label>New Preview Image (Optional)</label>
            <label class="file-input-label" id="editPreviewLabel">
                <span id="editPreviewLabelText">📷 Choose an image (.png, .jpg, .webp)</span>
                <input type="file" id="editPreview" accept="image/*" onchange="updateFileLabel(this, 'editPreviewLabelText')">
            </label>
        </div>
        <div class="field">
            <label>New File (Optional, .json, .zip, .rar)</label>
            <label class="file-input-label" id="editFileLabel">
                <span id="editFileLabelText">📁 Choose a file</span>
                <input type="file" id="editFile" accept=".json,.zip,.rar" onchange="updateFileLabel(this, 'editFileLabelText')">
            </label>
        </div>
        <div id="editError" class="error-text" style="display:none;"></div>
        <div id="editSuccess" class="success-text" style="display:none;"></div>
        <button class="btn btn-accent" id="editBtn" style="width:100%;justify-content:center;margin-top:8px;" onclick="submitEdit()">💾 Save Changes</button>
    </div>
</div>

<script>
// ============================================================
// SUPABASE CONFIG
// ============================================================
// ⚠️  REPLACE THESE with your real Supabase project values!
//     Find them at: supabase.com → your project → Settings → API
const SUPABASE_URL = 'https://vglpzpffejwgttlqrums.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnbHB6cGZmZWp3Z3R0bHFydW1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMTUwNDUsImV4cCI6MjA5Mjg5MTA0NX0.2g1thhc4pbrRP8LbYPpOsTACj2VNMzldXbrIArBdVqE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// STATE
// ============================================================
let currentUser = null;
let currentProfile = null;
let currentFilter = 'all';
let allItems = [];

// ============================================================
// MODAL HELPERS
// ============================================================
function showModal(id) { document.getElementById(id).classList.add('show'); }
function hideModal(id) {
    document.getElementById(id).classList.remove('show');
    // Clear errors
    document.querySelectorAll('.error-text, .success-text').forEach(el => { el.style.display = 'none'; el.textContent = ''; });
}
function showError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
function showSuccess(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }
function updateFileLabel(input, spanId) {
    const span = document.getElementById(spanId);
    if (input.files[0]) span.textContent = '✅ ' + input.files[0].name;
}

// ============================================================
// AUTH
// ============================================================
async function signUp() {
    const username = document.getElementById('signupUsername').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;

    if (!username || !email || !password) return showError('signupError', 'All fields are required.');
    if (password.length < 6) return showError('signupError', 'Password must be at least 6 characters.');

    // Pass username as metadata — the database trigger will auto-create the profile row
    const { data, error } = await sb.auth.signUp({
        email,
        password,
        options: { data: { username } }
    });
    if (error) return showError('signupError', error.message);

    showSuccess('signupSuccess', 'Account created! Check your email to confirm, then log in.');
}

async function logIn() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showError('loginError', 'Both fields are required.');

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) return showError('loginError', error.message);

    hideModal('loginModal');
    await refreshAuth();
}

async function logOut() {
    await sb.auth.signOut();
    currentUser = null;
    currentProfile = null;
    updateAuthUI();
}

async function refreshAuth() {
    const { data: { user } } = await sb.auth.getUser();
    currentUser = user;
    if (user) {
        const { data } = await sb.from('profiles').select('*').eq('id', user.id).single();
        currentProfile = data;
    }
    updateAuthUI();
}

function updateAuthUI() {
    const authBtns = document.getElementById('authBtns');
    const userArea = document.getElementById('userArea');
    if (currentUser && currentProfile) {
        authBtns.style.display = 'none';
        userArea.style.display = 'flex';
        userArea.style.gap = '10px';
        userArea.style.alignItems = 'center';
        document.getElementById('userName').textContent = currentProfile.username;
        document.getElementById('userAvatar').textContent = currentProfile.username.charAt(0).toUpperCase();
    } else {
        authBtns.style.display = 'flex';
        authBtns.style.gap = '8px';
        userArea.style.display = 'none';
    }
}

// ============================================================
// UPLOAD
// ============================================================
async function uploadItem() {
    if (!currentUser) return showError('uploadError', 'You must be logged in.');

    const name = document.getElementById('uploadName').value.trim();
    const type = document.getElementById('uploadType').value;
    const desc = document.getElementById('uploadDesc').value.trim();
    const previewFile = document.getElementById('uploadPreview').files[0];
    const mainFile = document.getElementById('uploadFile').files[0];

    if (!name || !desc || !mainFile) return showError('uploadError', 'Name, description, and file are required.');

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = 'Uploading...';

    try {
        const ts = Date.now();

        // Upload main file
        const filePath = `${currentUser.id}/${ts}_${mainFile.name}`;
        const { error: fileErr } = await sb.storage.from('files').upload(filePath, mainFile);
        if (fileErr) throw new Error('File upload failed: ' + fileErr.message);
        const file_url = sb.storage.from('files').getPublicUrl(filePath).data.publicUrl;

        // Upload preview (optional)
        let preview_url = null;
        if (previewFile) {
            const prevPath = `${currentUser.id}/${ts}_${previewFile.name}`;
            const { error: prevErr } = await sb.storage.from('previews').upload(prevPath, previewFile);
            if (prevErr) throw new Error('Preview upload failed: ' + prevErr.message);
            preview_url = sb.storage.from('previews').getPublicUrl(prevPath).data.publicUrl;
        }

        // Insert database row
        const { error: dbErr } = await sb.from('items').insert({
            author_id: currentUser.id, name, description: desc, type, file_url, preview_url
        });
        if (dbErr) throw new Error('Database insert failed: ' + dbErr.message);

        showSuccess('uploadSuccess', 'Published successfully! 🎉');
        // Clear form
        document.getElementById('uploadName').value = '';
        document.getElementById('uploadDesc').value = '';
        document.getElementById('uploadPreview').value = '';
        document.getElementById('uploadFile').value = '';
        document.getElementById('previewLabelText').textContent = '📷 Choose an image (.png, .jpg, .webp)';
        document.getElementById('fileLabelText').textContent = '📁 Choose a file';

        await fetchItems();
    } catch (err) {
        showError('uploadError', err.message);
    } finally {
        btn.disabled = false;
        btn.textContent = '🚀 Publish';
    }
}

// ============================================================
// FETCH & RENDER
// ============================================================
async function fetchItems() {
    const { data, error } = await sb
        .from('items')
        .select('*, profiles(username)')
        .order('created_at', { ascending: false });

    if (!error && data) {
        allItems = data;
        renderItems();
    }
}

function renderItems() {
    const grid = document.getElementById('itemsGrid');
    const search = document.getElementById('searchInput').value.toLowerCase();

    const filtered = allItems.filter(item => {
        const matchType = currentFilter === 'all' || item.type === currentFilter;
        const matchSearch = item.name.toLowerCase().includes(search) ||
                            (item.description || '').toLowerCase().includes(search) ||
                            (item.profiles?.username || '').toLowerCase().includes(search);
        return matchType && matchSearch;
    });

    if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty"><p>No items found. Be the first to upload!</p></div>';
        return;
    }

    grid.innerHTML = filtered.map(item => {
        const badge = item.type === 'theme' ? '🎨 Theme' : '⚙️ Plugin';
        const author = item.profiles?.username || 'Unknown';
        const preview = item.preview_url || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200"><rect fill="%2318181b" width="400" height="200"/><text fill="%23a1a1aa" font-family="sans-serif" font-size="14" x="50%" y="50%" text-anchor="middle" dominant-baseline="middle">No Preview</text></svg>');
        const installLink = 'sail-launcher://install-' + item.type + '?url=' + encodeURIComponent(item.file_url);

        const canEdit = currentUser && (currentUser.id === item.author_id || (currentProfile && currentProfile.username === 'Aseoriy'));
        
        return '<div class="card">' +
            '<div class="card-img-wrap">' +
                '<span class="card-badge ' + item.type + '">' + badge + '</span>' +
                '<img class="card-img" src="' + preview + '" alt="' + item.name + ' preview" loading="lazy">' +
            '</div>' +
            '<div class="card-body">' +
                '<h3 class="card-title">' + item.name + '</h3>' +
                '<div class="card-meta">' +
                    '<span>By ' + author + '</span>' +
                    '<span>📥 ' + (item.downloads || 0) + '</span>' +
                '</div>' +
                '<p class="card-desc">' + (item.description || '') + '</p>' +
                '<div class="card-actions">' +
                    '<button class="btn btn-sm" onclick="downloadFile(\'' + item.file_url + '\', \'' + item.name.replace(/'/g, '') + '\', \'' + item.id + '\')">⬇ Download</button>' +
                    '<a href="' + installLink + '" class="btn btn-accent btn-sm" onclick="trackDownload(\'' + item.id + '\')">🚀 Install</a>' +
                    (canEdit ? 
                        '<button class="btn btn-sm" title="Edit" onclick="openEditModal(\'' + item.id + '\')">✏️</button>' +
                        '<button class="btn btn-sm" title="Delete" style="color:var(--danger);" onclick="deleteItem(\'' + item.id + '\')">🗑️</button>' 
                    : '') +
                '</div>' +
            '</div>' +
        '</div>';
    }).join('');
}

async function downloadFile(url, name, itemId) {
    try {
        const response = await fetch(url);
        const blob = await response.blob();
        const ext = url.split('.').pop().split('?')[0];
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name + '.' + ext;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
        // Track the download count
        await sb.rpc('increment_downloads', { item_id: itemId });
    } catch(err) { console.error('Download failed:', err); }
}

async function trackDownload(itemId) {
    await sb.rpc('increment_downloads', { item_id: itemId });
}

window.openEditModal = function(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    document.getElementById('editItemId').value = item.id;
    document.getElementById('editName').value = item.name;
    document.getElementById('editDesc').value = item.description || '';
    document.getElementById('editPreviewLabelText').textContent = '📷 Choose an image (.png, .jpg, .webp)';
    document.getElementById('editPreview').value = '';
    document.getElementById('editFileLabelText').textContent = '📁 Choose a file';
    document.getElementById('editFile').value = '';
    showModal('editModal');
};

window.deleteItem = async function(id) {
    if (!confirm('Are you sure you want to delete this item? This cannot be undone.')) return;
    try {
        const { error } = await sb.from('items').delete().eq('id', id);
        if (error) throw error;
        alert('Item deleted successfully!');
        fetchItems();
    } catch(err) {
        alert('Failed to delete: ' + err.message);
    }
};

window.submitEdit = async function() {
    const id = document.getElementById('editItemId').value;
    const name = document.getElementById('editName').value.trim();
    const desc = document.getElementById('editDesc').value.trim();
    const previewFile = document.getElementById('editPreview').files[0];
    const mainFile = document.getElementById('editFile').files[0];
    const btn = document.getElementById('editBtn');

    if (!name) return showError('editError', 'Name is required.');

    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
        const item = allItems.find(i => i.id === id);
        let preview_url = item.preview_url;
        let file_url = item.file_url;
        const ts = Date.now();

        if (previewFile) {
            const prevPath = `${currentUser.id}/${ts}_edit_${previewFile.name}`;
            const { error: upErr } = await sb.storage.from('previews').upload(prevPath, previewFile);
            if (upErr) throw upErr;
            const { data: pubData } = sb.storage.from('previews').getPublicUrl(prevPath);
            preview_url = pubData.publicUrl;
        }

        if (mainFile) {
            const filePath = `${currentUser.id}/${ts}_edit_${mainFile.name}`;
            const { error: upErr } = await sb.storage.from('files').upload(filePath, mainFile);
            if (upErr) throw upErr;
            const { data: pubData } = sb.storage.from('files').getPublicUrl(filePath);
            file_url = pubData.publicUrl;
        }

        const { error } = await sb.from('items').update({
            name, description: desc, preview_url, file_url
        }).eq('id', id);

        if (error) throw error;

        showSuccess('editSuccess', 'Item updated successfully!');
        setTimeout(() => {
            hideModal('editModal');
            fetchItems();
            btn.disabled = false;
            btn.textContent = '💾 Save Changes';
        }, 1500);

    } catch(err) {
        showError('editError', err.message);
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
    }
};

// ============================================================
// EVENT LISTENERS
// ============================================================
document.getElementById('searchInput').addEventListener('input', renderItems);

document.getElementById('filterTabs').addEventListener('click', e => {
    if (!e.target.classList.contains('tab')) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    renderItems();
});

// Close modals on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
        if (e.target === overlay) hideModal(overlay.id);
    });
});

// ============================================================
// INIT
// ============================================================
(async () => {
    await refreshAuth();
    await fetchItems();
})();
</script>
